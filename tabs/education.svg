<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 70" width="100%">
  <defs>
    <linearGradient id="grad-edu" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e1065;stop-opacity:1" />
    </linearGradient>
  </defs>
  <style>
    .tab-card {
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), filter 0.3s ease;
      transform-origin: center;
    }
    .tab-card:hover {
      transform: translateY(-4px);
      filter: drop-shadow(0px 8px 16px rgba(168, 85, 247, 0.5));
    }
    .tab-title {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-weight: 700;
      fill: #ffffff;
      font-size: 22px;
      letter-spacing: 0.5px;
    }
  </style>
  <g class="tab-card">
    <rect x="5" y="5" width="590" height="60" rx="15" fill="url(#grad-edu)" stroke="#a855f7" stroke-width="2" />
    <text x="30" y="42" class="tab-title">🎓 Education</text>
  </g>
</svg>
